version: '3.8'

services:

  eureka-server:
    build: ./service-registry
    ports:
      - "8761:8761"

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
      - mysql

  github-analysis-service:
    build: ./github-analysis-service
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
      - redis
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN}

  mysql:
    image: mysql:8
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devtwin
    ports:
      - "3307:3306"

  redis:
    image: redis:latest
    container_name: redis-container
    ports:
      - "6379:6379"